<!DOCTYPE html>
<html lang="en">
<head>

<style>

</style>
</head>
<body>
<div id="game"></div><div id="dmg"></div>
<div id="hud" class="hud hidden">
  <div id="ch"></div>
  <div id="hp-w"><div id="hp-l"><span>HULL</span><span id="hp-t">100/100</span></div><div id="hp-bg"><div id="hp-f"></div></div></div>

<div id="over" class="over hidden"><h2 id="rt">VICTORY!</h2><p id="rs"></p><button id="rBtn" class="btn" type="button">PLAY AGAIN</button></div>
<script type="module">
import * as THREE from './vendor/three.module.js';
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x7fad5a);
scene.fog=new THREE.FogExp2(0x8fba60,0.009);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,600);
camera.position.set(0,40,40);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.getElementById('game').appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.68));
const sun=new THREE.DirectionalLight(0xfff2cc,1.25);
sun.position.set(90,130,60);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const sc=sun.shadow.camera;sc.left=sc.bottom=-130;sc.right=sc.top=130;sc.far=500;
scene.add(sun);
const actx=new(window.AudioContext||window.webkitAudioContext)();
function snd(T){
  try{const t=actx.currentTime;
  if(T===0){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(170,t);o.frequency.exponentialRampToValueAtTime(18,t+.45);g.gain.setValueAtTime(.42,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);o.start(t);o.stop(t+.45);}
  else if(T===1){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(22,t+.3);g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);}
  else if(T===2){const len=Math.floor(actx.sampleRate*1.1),buf=actx.createBuffer(1,len,actx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);const src=actx.createBufferSource(),g=actx.createGain();src.buffer=buf;g.gain.value=.75;src.connect(g);g.connect(actx.destination);src.start(t);}
  else if(T===3){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.value=52+Math.random()*18;g.gain.setValueAtTime(.016,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);}
  }catch{}}
const mat={
  pB:new THREE.MeshLambertMaterial({color:0x4a7c3f}),pT:new THREE.MeshLambertMaterial({color:0x2e5e2e}),
  eB:new THREE.MeshLambertMaterial({color:0x8b4a22}),eT:new THREE.MeshLambertMaterial({color:0x6b3010}),
  tr:new THREE.MeshLambertMaterial({color:0x1c1c1c}),wh:new THREE.MeshLambertMaterial({color:0x2a2a2a}),
  ba:new THREE.MeshLambertMaterial({color:0x181818}),sh:new THREE.MeshLambertMaterial({color:0xffe040}),
  gnd:new THREE.MeshLambertMaterial({color:0x5a7a3a}),bld:new THREE.MeshLambertMaterial({color:0x8a8070}),
  rub:new THREE.MeshLambertMaterial({color:0x6a6050}),lv:new THREE.MeshLambertMaterial({color:0x2d6030}),
  tk:new THREE.MeshLambertMaterial({color:0x5a4025}),
};
const hpF=document.getElementById('hp-f'),hpTx=document.getElementById('hp-t');
const rlF=document.getElementById('rl-f'),rlT=document.getElementById('rl-t');
const klV=document.getElementById('kl-v'),klR=document.getElementById('kl-r');
const spdV=document.getElementById('spd-v');
const mdV=document.getElementById('md-v');
const hudEl=document.getElementById('hud'),menuEl=document.getElementById('menu');
const overEl=document.getElementById('over'),rtEl=document.getElementById('rt'),rsEl=document.getElementById('rs');
const dmgEl=document.getElementById('dmg'),mmC=document.getElementById('mm'),mmX=mmC.getContext('2d');
const lanInfoEl=document.getElementById('lanInfo');
const modeBtns=[...document.querySelectorAll('.mBtn')],modeDescEl=document.getElementById('modeDesc');
const modeText={
  '1v1':'1v1 duel mode: one enemy ace tank.',
  team:'Team vs Team: you + allies fight an enemy squad.',
  friends:'Friends vs Friends: larger squad battle with allies and enemies.',
  lan:'LAN 1v1: two devices on same Wi-Fi play one shared match.'
};
let selectedMode='1v1';
let lastStartedMode='1v1';
let state='menu',kills=0,player=null,lanOpponent=null,enemies=[],allies=[],shells=[],exps=[],obs=[],gameGrp=new THREE.Group();
let netSock=null,netSeat=0,netPeerReady=false,netLastSend=0;
let camKick=0;
scene.add(gameGrp);
const keys={},mouse=new THREE.Vector2();
let engT=0,shootQ=false;
const clock=new THREE.Clock(false);
function rnd(r){return(Math.random()-.5)*r;}
function makeTank(x,z,isP,team=1){
  const g=new THREE.Group(),bm=isP?mat.pB:mat.eB,tm=isP?mat.pT:mat.eT;
  const hull=new THREE.Mesh(new THREE.BoxGeometry(2.4,.9,3.6),bm);
  hull.position.y=.55;hull.castShadow=true;hull.receiveShadow=true;g.add(hull);
  [-1.25,1.25].forEach(sx=>{
    const tr=new THREE.Mesh(new THREE.BoxGeometry(.48,.68,3.9),mat.tr);tr.position.set(sx,.37,0);tr.castShadow=true;g.add(tr);
    for(let wz=-1.5;wz<=1.5;wz+=.75){const w=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.38,7),mat.wh);w.rotation.z=Math.PI/2;w.position.set(sx,.3,wz);g.add(w);}
  });
  const tB=new THREE.Mesh(new THREE.CylinderGeometry(.78,.88,.48,12),tm);tB.position.y=1.26;tB.castShadow=true;g.add(tB);
  const turret=new THREE.Group();turret.position.y=1.33;
  const tBox=new THREE.Mesh(new THREE.BoxGeometry(1.2,.52,1.6),tm);tBox.castShadow=true;turret.add(tBox);
  const bar=new THREE.Mesh(new THREE.CylinderGeometry(.09,.13,2.6,8),mat.ba);bar.rotation.x=Math.PI/2;bar.position.set(0,.05,-1.72);turret.add(bar);
  g.add(turret);
  g.userData={turret,isP,team,hp:100,maxHp:100,facing:0,turretRot:0,turretFacingGoal:0,reloadT:0,reloadMax:isP?0.55:1.45,alive:true,
    vel:new THREE.Vector3(0,0,0),speed:0,maxSpeed:isP?28:24,accel:isP?35:28,brakeDrag:8,rollDrag:0.18,turretRotSpd:2.2,
    aiState:'patrol',patrol:new THREE.Vector3(rnd(140),0,rnd(140)),aiDelay:2+Math.random()*2,stuckT:0,lastDmg:0};
  g.position.set(x,0,z);gameGrp.add(g);return g;
}
function mkObs(x,z,w,h,d,m){
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
  mesh.position.set(x,h/2,z);mesh.castShadow=true;mesh.receiveShadow=true;gameGrp.add(mesh);
  obs.push({minX:x-w/2,maxX:x+w/2,minZ:z-d/2,maxZ:z+d/2,h});
}
function mkTree(x,z){
  const g=new THREE.Group();
  const t=new THREE.Mesh(new THREE.CylinderGeometry(.22,.3,1.8,6),mat.tk);t.position.y=.9;t.castShadow=true;g.add(t);
  const l=new THREE.Mesh(new THREE.SphereGeometry(1.4,7,7),mat.lv);l.position.y=2.75;l.castShadow=true;g.add(l);
  g.position.set(x,0,z);gameGrp.add(g);obs.push({minX:x-.9,maxX:x+.9,minZ:z-.9,maxZ:z+.9,h:4});
}
function buildMap(){
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(250,250),mat.gnd);gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;gameGrp.add(gnd);
  [[0,10,7,6,3],[12,0,4,7,4],[-10,-8,3,5,9],[18,-13,6,5,3],[-17,14,8,6,3],[-6,22,4,4,5],[23,19,5,7,4],[-23,-19,4,6,5],[30,-24,6,5,4],[-30,23,5,5,6],[0,-40,9,5,4],[40,0,4,5,9],[-40,13,4,5,8],[46,32,7,7,5],[-46,-32,5,6,7]]
    .forEach(([x,z,w,h,d])=>mkObs(x,z,w,h,d,mat.bld));
  [[23,0,1.5,4,24],[-23,6,1.5,4,18],[6,30,26,4,1.5],[-9,-30,22,4,1.5]]
    .forEach(([x,z,w,h,d])=>mkObs(x,z,w,h,d,mat.rub));
  for(let i=0;i<28;i++){const x=rnd(210),z=rnd(210);if(Math.abs(x)<12&&Math.abs(z)<12)continue;const s=.7+Math.random()*1.6;mkObs(x,z,s,s*.5,s,mat.rub);}
  [[52,52],[-52,52],[52,-52],[-52,-52],[72,22],[-72,-22],[22,72],[-22,-72],[82,52],[-82,-52],[52,82],[-52,-82]]
    .forEach(([x,z])=>mkTree(x,z));
}
const gPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0),aimRay=new THREE.Raycaster(),aimPt=new THREE.Vector3();
function worldAim(){aimRay.setFromCamera(mouse,camera);aimRay.ray.intersectPlane(gPlane,aimPt);return aimPt;}
function blocked(px,pz,hw,hd){const x1=px-hw,x2=px+hw,z1=pz-hd,z2=pz+hd;for(const o of obs)if(x1<o.maxX&&x2>o.minX&&z1<o.maxZ&&z2>o.minZ)return true;return false;}
function fireShell(tank,fromNet=false,netVx=0,netVz=0){
  if(tank.userData.reloadT>0)return;
  const angle=tank.userData.facing+tank.userData.turretRot;
  const dir=new THREE.Vector3(-Math.sin(angle),0,-Math.cos(angle));
  const pos=tank.position.clone();pos.y=1.45;pos.addScaledVector(dir,2.9);
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(.16,6,6),mat.sh);mesh.position.copy(pos);gameGrp.add(mesh);
  const initVel=82;
  const vel=(fromNet&&netVx&&netVz)?new THREE.Vector3(netVx,0,netVz):dir.clone().multiplyScalar(initVel);
  shells.push({mesh,vel,owner:tank,life:5.5,trail:[]});
  for(let i=0;i<3;i++){setTimeout(()=>{if(gameGrp.children.includes(mesh)){const t=new THREE.Mesh(new THREE.SphereGeometry(.08,4,4),new THREE.MeshBasicMaterial({color:0xffaa44,transparent:true,opacity:.6}));t.position.copy(mesh.position);gameGrp.add(t);shells[shells.length-1]?.trail?.push(t);setTimeout(()=>gameGrp.remove(t),140);}},i*15)}
  const fl=new THREE.Mesh(new THREE.SphereGeometry(.7,6,6),new THREE.MeshBasicMaterial({color:0xffaa00}));
  fl.position.copy(pos.clone().addScaledVector(dir,-.8));gameGrp.add(fl);setTimeout(()=>gameGrp.remove(fl),120);
  if(selectedMode==='lan'&&tank===player&&!fromNet){netSend({type:'fire',vx:vel.x,vz:vel.z});}
  if(tank===player)camKick=Math.min(1.2,camKick+.38);
  tank.userData.reloadT=tank.userData.reloadMax;snd(0);
}
function spawnExp(pos){
  const g=new THREE.Group();const cols=[0xff6600,0xff2200,0xffaa00,0xffdd44,0xff8800];
  for(let i=0;i<12;i++){const s=.3+Math.random()*.9;const m=new THREE.Mesh(new THREE.SphereGeometry(s,5,5),new THREE.MeshBasicMaterial({color:cols[i%cols.length],transparent:true}));const a=(i/12)*Math.PI*2+Math.random()*.5,r=Math.random()*2.2;m.position.set(Math.cos(a)*r,Math.random()*2.5,Math.sin(a)*r);m.userData.vel=new THREE.Vector3((Math.random()-.5)*5,2.5+Math.random()*6,(Math.random()-.5)*5);g.add(m);}
  for(let i=0;i<5;i++){const s=.7+Math.random()*1.3;const m=new THREE.Mesh(new THREE.SphereGeometry(s,5,5),new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:.55}));m.position.set((Math.random()-.5)*2,.6+Math.random(),(Math.random()-.5)*2);m.userData.vel=new THREE.Vector3((Math.random()-.5)*2.5,3.5+Math.random()*4,(Math.random()-.5)*2.5);g.add(m);}
  g.position.copy(pos);gameGrp.add(g);exps.push({mesh:g,life:1.3,max:1.3});snd(2);
}
function setHP(){if(!player)return;const pct=Math.max(0,player.userData.hp/player.userData.maxHp)*100;hpF.style.width=pct+'%';hpTx.textContent=Math.max(0,Math.round(player.userData.hp))+'/'+player.userData.maxHp;if(pct>60)hpF.style.background='linear-gradient(90deg,#27ae60,#2ecc71)';else if(pct>30)hpF.style.background='linear-gradient(90deg,#e67e22,#f1c40f)';else hpF.style.background='linear-gradient(90deg,#922b21,#e74c3c)';}
function flashDmg(){dmgEl.classList.add('flash');setTimeout(()=>dmgEl.classList.remove('flash'),210);}
function endGame(won){state=won?'won':'dead';hudEl.classList.add('hidden');overEl.classList.remove('hidden');rtEl.textContent=won?'VICTORY!':'DESTROYED!';rsEl.textContent=(won?'All enemies eliminated.':'Tank destroyed.')+'  Kills: '+kills;}
function setupMode(mode){
  const cfg={
    '1v1':{enemies:[[65,0]],allies:[]},
    team:{enemies:[[65,65],[-65,65],[65,-65],[-65,-65]],allies:[[22,18],[-22,18]]},
    friends:{enemies:[[65,65],[-65,65],[65,-65]],allies:[[22,18],[-22,18],[0,28]]}
  }[mode]||{enemies:[[65,0]],allies:[]};
  cfg.enemies.forEach(([x,z])=>enemies.push(makeTank(x,z,false,1)));
  cfg.allies.forEach(([x,z])=>allies.push(makeTank(x,z,false,0)));
}
function nearestOpponent(bot){
  const candidates=[player,lanOpponent,...enemies,...allies].filter(t=>t&&t.userData.alive&&t.userData.team!==bot.userData.team);
  if(!candidates.length)return null;
  let best=candidates[0],bestD=bot.position.distanceTo(best.position);
  for(let i=1;i<candidates.length;i++){const d=bot.position.distanceTo(candidates[i].position);if(d<bestD){best=candidates[i];bestD=d;}}
  return best;
}
function wsURL(){return (location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws';}
function netSetInfo(msg){if(lanInfoEl)lanInfoEl.textContent=msg;}
function netClose(){if(netSock){try{netSock.close();}catch{}netSock=null;}netSeat=0;netPeerReady=false;}
function netSend(obj){if(netSock&&netSock.readyState===1)netSock.send(JSON.stringify(obj));}
function connectLAN(){
  return new Promise((resolve,reject)=>{
    netClose();
    netSetInfo('LAN: connecting...');
    const s=new WebSocket(wsURL());
    netSock=s;
    let settled=false;
    s.onopen=()=>{netSetInfo('LAN: connected, waiting for seat...');};
    s.onerror=()=>{if(!settled){settled=true;reject(new Error('Could not connect LAN socket'));}netSetInfo('LAN: connection error');};
    s.onclose=()=>{if(selectedMode==='lan'&&state!=='menu')netSetInfo('LAN: disconnected');};
    s.onmessage=(ev)=>{
      let m=null;try{m=JSON.parse(ev.data);}catch{return;}
      if(m.type==='seat'){netSeat=m.seat||1;netSetInfo('LAN: you are Player '+netSeat+'. Waiting for opponent...');if(!settled){settled=true;resolve();}}
      if(m.type==='ready'){netPeerReady=!!m.ready;netSetInfo(netPeerReady?'LAN: opponent joined, battle live.':'LAN: waiting for opponent...');}
      if(m.type==='state'&&lanOpponent){
        lanOpponent.position.set(m.x||0,0,m.z||0);
        lanOpponent.userData.facing=m.facing||0;
        lanOpponent.rotation.y=lanOpponent.userData.facing;
        lanOpponent.userData.turretRot=m.turret||0;
        lanOpponent.userData.turret.rotation.y=lanOpponent.userData.turretRot;
        lanOpponent.userData.speed=m.speed||0;
        lanOpponent.userData.hp=(m.hp==null?lanOpponent.userData.hp:m.hp);
        lanOpponent.userData.alive=m.alive!==false;
        if(!lanOpponent.userData.alive&&state==='playing')setTimeout(()=>endGame(true),300);
      }
      if(m.type==='fire'&&lanOpponent&&lanOpponent.userData.alive){fireShell(lanOpponent,true,m.vx,m.vz);}
    };
  });
}
function initGame(startMode=selectedMode){
  lastStartedMode=startMode;
  mdV.textContent=(startMode==='team'?'TEAM VS TEAM':startMode==='friends'?'FRIENDS VS FRIENDS':startMode==='lan'?'LAN 1V1':'1V1');
  if(gameGrp.parent)scene.remove(gameGrp);gameGrp=new THREE.Group();scene.add(gameGrp);
  obs=[];shells=[];exps=[];enemies=[];allies=[];lanOpponent=null;kills=0;buildMap();
  if(startMode==='lan'){
    const px=netSeat===2?35:-35,ox=netSeat===2?-35:35;
    player=makeTank(px,0,true,0);
    player.userData.facing=netSeat===2?Math.PI/2:-Math.PI/2;
    player.rotation.y=player.userData.facing;
    lanOpponent=makeTank(ox,0,false,1);
    lanOpponent.userData.facing=netSeat===2?-Math.PI/2:Math.PI/2;
    lanOpponent.rotation.y=lanOpponent.userData.facing;
    klR.textContent='1 remaining';
  }else{
    player=makeTank(0,0,true,0);
    setupMode(startMode);
    klR.textContent=enemies.length+' remaining';
  }
  clock.start();state='playing';
  hudEl.classList.remove('hidden');menuEl.classList.add('hidden');overEl.classList.add('hidden');
  klV.textContent='0';setHP();
}
function updPlayer(dt){
  if(!player||!player.userData.alive)return;
  const fwd=new THREE.Vector3(-Math.sin(player.userData.facing),0,-Math.cos(player.userData.facing));
  let thrustDir=0;
  if(keys['w']||keys['W']||keys['ArrowUp'])thrustDir=1;
  if(keys['s']||keys['S']||keys['ArrowDown'])thrustDir=-0.6;
  const targetSpd=thrustDir*player.userData.maxSpeed;
  player.userData.speed+=(targetSpd-player.userData.speed)*(thrustDir!==0?player.userData.accel*dt:player.userData.brakeDrag*dt);
  player.userData.speed=Math.max(-player.userData.maxSpeed*.6,Math.min(player.userData.maxSpeed,player.userData.speed));
  if(Math.abs(player.userData.speed)>0.3){player.userData.vel.copy(fwd).multiplyScalar(player.userData.speed);const np=player.position.clone().addScaledVector(player.userData.vel,dt);np.clamp(new THREE.Vector3(-115,0,-115),new THREE.Vector3(115,0,115));if(!blocked(np.x,np.z,1.4,2.0))player.position.copy(np);engT-=dt;if(engT<=0){snd(3);engT=.09;}}
  if(keys['a']||keys['A']||keys['ArrowLeft'])player.userData.facing+=1.85*dt;
  if(keys['d']||keys['D']||keys['ArrowRight'])player.userData.facing-=1.85*dt;
  player.rotation.y=player.userData.facing;
  const aim=worldAim();if(aim&&isFinite(aim.x)){const wa=Math.atan2(-(aim.x-player.position.x),-(aim.z-player.position.z));player.userData.turretFacingGoal=wa-player.userData.facing;}
  let diff=player.userData.turretFacingGoal-player.userData.turretRot;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;player.userData.turretRot+=Math.sign(diff)*Math.min(Math.abs(diff),player.userData.turretRotSpd*dt);player.userData.turret.rotation.y=player.userData.turretRot;
  if(player.userData.reloadT>0){player.userData.reloadT=Math.max(0,player.userData.reloadT-dt);rlF.style.width=Math.min(100,(1-player.userData.reloadT/player.userData.reloadMax)*100)+'%';rlT.textContent='RELOADING';}
  else{rlF.style.width='100%';rlT.textContent='READY';}
  spdV.textContent=Math.round(Math.abs(player.userData.speed))+'km/h';
  if(shootQ){fireShell(player);shootQ=false;}
  camKick=Math.max(0,camKick-dt*1.9);
  const cp=player.position.clone().add(new THREE.Vector3(0,2.2+camKick*0.15,0)).addScaledVector(fwd,1.5-camKick*0.3);
  camera.position.lerp(cp,.08);
  const lookPt=cp.clone().addScaledVector(fwd,30);
  camera.lookAt(lookPt.x,lookPt.y-camKick*0.45,lookPt.z);
  if(selectedMode==='lan'&&state==='playing'){netLastSend-=dt;if(netLastSend<=0){netSend({type:'state',x:player.position.x,z:player.position.z,facing:player.userData.facing,turret:player.userData.turretRot,speed:player.userData.speed,hp:player.userData.hp,alive:player.userData.alive});netLastSend=.05;}}
}
function updEnemy(e,dt){
  if(!e.userData.alive)return;
  const targetTank=nearestOpponent(e);
  if(!targetTank){e.userData.aiState='patrol';return;}
  const dist=e.position.distanceTo(targetTank.position);
  const dx=targetTank.position.x-e.position.x,dz=targetTank.position.z-e.position.z;
  if(dist<52&&targetTank.userData.alive)e.userData.aiState='combat';else if(dist>68)e.userData.aiState='patrol';
  const tgt=e.userData.aiState==='combat'?targetTank.position:e.userData.patrol;
  const tdx=tgt.x-e.position.x,tdz=tgt.z-e.position.z,tA=Math.atan2(-tdx,-tdz),dToT=Math.sqrt(tdx*tdx+tdz*tdz);
  let diff=tA-e.userData.facing;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
  e.userData.facing+=Math.sign(diff)*Math.min(Math.abs(diff),1.4*dt);e.rotation.y=e.userData.facing;
  const stopD=e.userData.aiState==='combat'?24:2;
  if(dToT>stopD&&Math.abs(diff)<Math.PI/2.6){let thrustDir=e.userData.speed<e.userData.maxSpeed*0.7?1:-0.4;e.userData.speed+=(thrustDir*e.userData.maxSpeed-e.userData.speed)*(e.userData.accel*dt);const fwd=new THREE.Vector3(-Math.sin(e.userData.facing),0,-Math.cos(e.userData.facing));const np=e.position.clone().addScaledVector(fwd,e.userData.speed*dt);np.clamp(new THREE.Vector3(-115,0,-115),new THREE.Vector3(115,0,115));e.userData.stuckT++;if(!blocked(np.x,np.z,1.4,2.0)){e.position.copy(np);e.userData.stuckT=0;}else if(e.userData.stuckT>55){e.userData.patrol.set(rnd(130),0,rnd(130));e.userData.stuckT=0;}}else{e.userData.speed=Math.max(0,e.userData.speed-e.userData.brakeDrag*dt*2);}if(e.userData.aiState==='patrol'&&dToT<3)e.userData.patrol.set(rnd(130),0,rnd(130));
  const leadDist=dist>30?15:8;const pVelLen=Math.sqrt(targetTank.userData.vel.x*targetTank.userData.vel.x+targetTank.userData.vel.z*targetTank.userData.vel.z);const leadPt=targetTank.position.clone().addScaledVector(targetTank.userData.vel,leadDist/Math.max(1,pVelLen));const ldx=leadPt.x-e.position.x,ldz=leadPt.z-e.position.z;e.userData.turretFacingGoal=Math.atan2(-ldx,-ldz)-e.userData.facing;
  let tDiff=e.userData.turretFacingGoal-e.userData.turretRot;while(tDiff>Math.PI)tDiff-=Math.PI*2;while(tDiff<-Math.PI)tDiff+=Math.PI*2;e.userData.turretRot+=Math.sign(tDiff)*Math.min(Math.abs(tDiff),e.userData.turretRotSpd*dt);e.userData.turret.rotation.y=e.userData.turretRot;
  e.userData.reloadT=Math.max(0,e.userData.reloadT-dt);
  if(e.userData.aiState==='combat'&&targetTank.userData.alive){e.userData.aiDelay-=dt;if(e.userData.aiDelay<=0&&e.userData.reloadT<=0&&dist<45&&Math.abs(tDiff)<0.3){fireShell(e);e.userData.aiDelay=1.8+Math.random()*1.5;}}
}
function updShells(dt){
  for(let i=shells.length-1;i>=0;i--){const s=shells[i];s.life-=dt;if(s.life<=0){gameGrp.remove(s.mesh);shells.splice(i,1);continue;}
  s.mesh.position.addScaledVector(s.vel,dt);s.vel.y-=9*dt;const sp=s.mesh.position;
  if(sp.y<=.1){spawnExp(sp.clone());gameGrp.remove(s.mesh);shells.splice(i,1);continue;}
  let gone=false;for(const o of obs){if(sp.x>o.minX&&sp.x<o.maxX&&sp.z>o.minZ&&sp.z<o.maxZ&&sp.y<o.h+.5){spawnExp(sp.clone());gameGrp.remove(s.mesh);shells.splice(i,1);gone=true;break;}}if(gone)continue;
  const targets=[player,lanOpponent,...enemies,...allies].filter(t=>t&&t.userData.alive&&t!==s.owner&&t.userData.team!==s.owner.userData.team);
  for(const t of targets){if(sp.distanceTo(t.position)<2.3&&sp.y<3.8){spawnExp(sp.clone());gameGrp.remove(s.mesh);shells.splice(i,1);const dmg=18+Math.floor(Math.random()*14);t.userData.hp-=dmg;snd(1);if(t===player){setHP();flashDmg();if(t.userData.hp<=0){t.userData.alive=false;spawnExp(t.position.clone());gameGrp.remove(t);setTimeout(()=>endGame(false),950);}}else{if(t.userData.hp<=0){t.userData.alive=false;spawnExp(t.position.clone());gameGrp.remove(t);if(t.userData.team===1){kills++;klV.textContent=kills;}const alive=enemies.filter(e=>e.userData.alive).length;klR.textContent=alive+' remaining';if(alive===0)setTimeout(()=>endGame(true),950);}}gone=true;break;}}if(gone)continue;}
}
function updExps(dt){for(let i=exps.length-1;i>=0;i--){const e=exps[i];e.life-=dt;if(e.life<=0){gameGrp.remove(e.mesh);exps.splice(i,1);continue;}const tt=1-e.life/e.max;e.mesh.children.forEach(c=>{if(c.userData.vel){c.userData.vel.y-=9.81*dt;c.position.addScaledVector(c.userData.vel,dt);}if(c.material&&c.material.transparent)c.material.opacity=Math.max(0,1-tt*1.6);});}}
const MM=130,MMS=MM/240;
function drawMM(){mmX.clearRect(0,0,MM,MM);mmX.fillStyle='rgba(0,14,0,.78)';mmX.fillRect(0,0,MM,MM);mmX.fillStyle='#4a4a38';for(const o of obs)mmX.fillRect((o.minX+120)*MMS,(o.minZ+120)*MMS,Math.max(1,(o.maxX-o.minX)*MMS),Math.max(1,(o.maxZ-o.minZ)*MMS));for(const e of enemies){if(!e.userData.alive)continue;mmX.fillStyle='#cc3318';mmX.beginPath();mmX.arc((e.position.x+120)*MMS,(e.position.z+120)*MMS,3,0,Math.PI*2);mmX.fill();}if(lanOpponent&&lanOpponent.userData.alive){mmX.fillStyle='#ff3355';mmX.beginPath();mmX.arc((lanOpponent.position.x+120)*MMS,(lanOpponent.position.z+120)*MMS,4,0,Math.PI*2);mmX.fill();}if(player&&player.userData.alive){const px=(player.position.x+120)*MMS,pz=(player.position.z+120)*MMS;mmX.fillStyle='#44ff55';mmX.beginPath();mmX.arc(px,pz,4,0,Math.PI*2);mmX.fill();mmX.strokeStyle='#44ff55';mmX.lineWidth=1.5;mmX.beginPath();mmX.moveTo(px,pz);const fa=player.userData.facing;mmX.lineTo(px-Math.sin(fa)*8,pz-Math.cos(fa)*8);mmX.stroke();}mmX.strokeStyle='#3a6030';mmX.lineWidth=1;mmX.strokeRect(.5,.5,MM-1,MM-1);}
function animate(){requestAnimationFrame(animate);if(state==='playing'){const dt=Math.min(clock.getDelta(),.05);updPlayer(dt);[...enemies,...allies].forEach(e=>{updEnemy(e,dt);if(e.userData.lastDmg>0){e.userData.lastDmg-=dt;const hit=Math.min(1,1-e.userData.lastDmg);for(const c of e.children){if(c.rotation)c.rotation.x+=Math.random()*hit*0.05;}}});updShells(dt);updExps(dt);drawMM();}renderer.render(scene,camera);}
addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;});
addEventListener('mousedown',e=>{if(e.button===0&&state==='playing'){actx.resume().catch(()=>{});shootQ=true;}});
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&state==='playing'){e.preventDefault();actx.resume().catch(()=>{});shootQ=true;}});
addEventListener('keyup',e=>{keys[e.key]=false;});
document.getElementById('sBtn').addEventListener('click',async()=>{actx.resume().catch(()=>{});const modeToStart=selectedMode;if(modeToStart==='lan'){try{await connectLAN();}catch{netSetInfo('LAN: failed to connect. Start with node lan-server.js');return;}if(!netSeat){netSetInfo('LAN: waiting for server seat...');return;}}initGame(modeToStart);});
document.getElementById('rBtn').addEventListener('click',()=>{actx.resume().catch(()=>{});initGame(lastStartedMode);});
modeBtns.forEach(b=>b.addEventListener('click',()=>{selectedMode=b.dataset.mode||'1v1';modeBtns.forEach(x=>x.classList.toggle('active',x===b));modeDescEl.textContent=modeText[selectedMode]||modeText['1v1'];if(selectedMode!=='lan'){netSetInfo('');netClose();}else{netSetInfo('LAN: press START BATTLE on both devices.');}}));
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
addEventListener('contextmenu',e=>e.preventDefault());
animate();
</script>
